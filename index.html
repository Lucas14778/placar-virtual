<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar Virtual da Copa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="placar-container">
        <h1>🏆 Copa 2026 - Final</h1>
        
        <div class="painel">
            <!-- Time da Casa -->
            <div class="time">
                <h2 id="nome-time-casa">Brasil 🇧🇷</h2>
                <div class="pontuacao" id="placar-casa">0</div>
                <div class="controles">
                    <button class="btn-gol" onclick="adicionarGol('casa')">+ Gol</button>
                    <button class="btn-tira" onclick="removerGol('casa')">- Gol</button>
                </div>
            </div>

            <div class="separador">X</div>

            <!-- Time Visitante -->
            <div class="time">
                <h2 id="nome-time-fora">França 🇫🇷</h2>
                <div class="pontuacao" id="placar-fora">0</div>
                <div class="controles">
                    <button class="btn-gol" onclick="adicionarGol('fora')">+ Gol</button>
                    <button class="btn-tira" onclick="removerGol('fora')">- Gol</button>
                </div>
            </div>
        </div>

        <button class="btn-zerar" onclick="zerarPlacar()">Zerar Jogo 🔄</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
